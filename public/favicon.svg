<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 圆形背景 -->
  <circle cx="64" cy="64" r="62" fill="#3b82f6" />
  <circle cx="64" cy="64" r="52" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" />
  
  <!-- 指南针刻度（简化：4 个主方向点） -->
  <circle cx="64" cy="16" r="3" fill="white" opacity="0.8" />
  <circle cx="64" cy="112" r="3" fill="white" opacity="0.8" />
  <circle cx="16" cy="64" r="3" fill="white" opacity="0.8" />
  <circle cx="112" cy="64" r="3" fill="white" opacity="0.8" />
  
  <!-- 指南针指针 -->
  <polygon points="64,22 54,64 64,78 74,64" fill="white" opacity="0.95" />
  <polygon points="64,106 54,64 64,50 74,64" fill="white" opacity="0.5" />
  
  <!-- 中心圆 -->
  <circle cx="64" cy="64" r="7" fill="#3b82f6" />
  <circle cx="64" cy="64" r="4" fill="white" />
  
  <!-- N 标记 -->
  <text x="64" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white" opacity="0.9">N</text>
</svg>
